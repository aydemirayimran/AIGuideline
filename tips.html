  <script>
    function toggleCategory(header) {
      const category = header.parentElement;
      const content = category.querySelector('.category-content');
      const icon = header.querySelector('.tip-icon');
      if (content.classList.contains('active')) {
        content.classList.remove('active'); icon.classList.remove('open');
      } else {
        document.querySelectorAll('.category-content').forEach(item => item.classList.remove('active'));
        document.querySelectorAll('.tip-icon').forEach(item => item.classList.remove('open'));
        content.classList.add('active'); icon.classList.add('open');
      }
    }
    function copyToClipboard(button) {
      const textToCopy = button.parentElement.querySelector('p').textContent;
      const labelSpan = button.querySelector('[data-i18n]');
      const originalKey = labelSpan?.getAttribute('data-i18n');
      navigator.clipboard.writeText(textToCopy).then(() => {
        if (labelSpan) {
          labelSpan.textContent = i18next.t('copied');
          setTimeout(() => {
            if (labelSpan && originalKey) {
              labelSpan.textContent = i18next.t(originalKey);
            }
          }, 2000);
        }
      }).catch(err => console.error('Kunne ikke kopiere tekst: ', err));
    }
  </script>
